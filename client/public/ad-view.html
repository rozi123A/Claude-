<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1420;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(14,165,233,0.2);
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 15px; color: rgba(255,255,255,0.7); text-align: center; }
    .sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div class="msg">جاري تحميل الإعلان...</div>
  <div class="sub">شاهد الإعلان للحصول على مكافأتك</div>

  <script>
    // Inject Monetag interstitial — zone 11003103
    (function() {
      var s = document.createElement('script');
      s.dataset.zone = '11003103';
      s.src = 'https://al5sm.com/tag.min.js';
      s.onload = function() {
        setTimeout(function() {
          var fn = window['show_11003103'];
          if (typeof fn === 'function') {
            fn();
            document.querySelector('.msg').textContent = 'شاهد الإعلان...';
            document.querySelector('.sub').textContent = 'يمكنك العودة بعد مشاهدته';
          } else {
            document.querySelector('.msg').textContent = 'يمكنك العودة الآن';
            document.querySelector('.sub').textContent = '';
          }
        }, 500);
      };
      s.onerror = function() {
        document.querySelector('.msg').textContent = 'يمكنك العودة الآن';
        document.querySelector('.sub').textContent = '';
      };
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
